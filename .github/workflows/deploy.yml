name: Deploy Quiz to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Inject token into HTML files
        run: |
          # Replace placeholder in both files — token never stored in repo
          sed -i "s|__DISPATCH_TOKEN_PLACEHOLDER__|${{ secrets.DISPATCH_TOKEN }}|g" index.html
          sed -i "s|__DISPATCH_TOKEN_PLACEHOLDER__|${{ secrets.DISPATCH_TOKEN }}|g" leaderboard.html
          echo "Tokens injected successfully"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4