name: Save Quiz Score

on:
  repository_dispatch:
    types: [save-score]

jobs:
  save-score:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update scores.json
        run: |
          node -e "
            const fs = require('fs');
            let scores = [];
            try { scores = JSON.parse(fs.readFileSync('scores.json', 'utf8')); } catch(e) {}

            const name   = process.env.PLAYER_NAME;
            const score  = parseInt(process.env.PLAYER_SCORE);
            const streak = parseInt(process.env.PLAYER_STREAK);

            const existing = scores.find(s => s.name === name);
            if (existing) {
              if (score > existing.score) {
                existing.score  = score;
                existing.streak = streak;
              }
            } else {
              scores.push({ name, score, streak });
            }

            scores.sort((a, b) => b.score - a.score);
            fs.writeFileSync('scores.json', JSON.stringify(scores, null, 2));
            console.log('Updated scores:', JSON.stringify(scores));
          "
        env:
          PLAYER_NAME:   ${{ github.event.client_payload.name }}
          PLAYER_SCORE:  ${{ github.event.client_payload.score }}
          PLAYER_STREAK: ${{ github.event.client_payload.streak }}

      - name: Commit updated scores.json
        run: |
          git config user.name  "Quiz Bot"
          git config user.email "quiz-bot@users.noreply.github.com"
          git add scores.json
          git diff --staged --quiet || git commit -m "Score: ${{ github.event.client_payload.name }} (${{ github.event.client_payload.score }} pts)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
